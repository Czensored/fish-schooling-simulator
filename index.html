<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Fish Schooling Simulator</title>
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel" aria-label="Simulation controls">
        <div class="panel-header">
          <h1>Fish School</h1>
        </div>

        <div class="control-group">
          <span class="control-label">Speed</span>
          <div class="segmented-control" role="group" aria-label="Simulation speed">
            <button class="speed-button is-active" type="button" data-speed="1" aria-pressed="true">
              1x
            </button>
            <button class="speed-button" type="button" data-speed="2" aria-pressed="false">
              2x
            </button>
            <button class="speed-button" type="button" data-speed="4" aria-pressed="false">
              4x
            </button>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Dimension</span>
          <div class="segmented-control view-mode-control" role="group" aria-label="Simulation view">
            <button class="view-button is-active" type="button" data-view-mode="2d" aria-pressed="true">
              2D
            </button>
            <button class="view-button" type="button" data-view-mode="3d" aria-pressed="false">
              3D
            </button>
          </div>
        </div>

        <div class="stat-row">
          <span class="stat-label">Fish eaten</span>
          <span class="stat-value" id="fish-eaten">0</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">Eaten / min</span>
          <span class="stat-value" id="fish-eaten-rate">0.0</span>
        </div>

        <div class="stat-row">
          <span class="stat-label">Sim time</span>
          <span class="stat-value" id="elapsed-time">0:00</span>
        </div>
      </aside>

      <main class="simulation-stage">
        <canvas id="simulation-2d" class="simulation-canvas" aria-label="2D fish schooling simulation"></canvas>
        <canvas id="simulation-3d" class="simulation-canvas is-hidden" aria-label="3D fish schooling simulation"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
